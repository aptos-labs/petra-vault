packages:
  - apps/*
  - packages/*

catalog:
  prettier: ^3.6.1
  typescript: ^5.8.3
  eslint-plugin-turbo: 2.9.3
  '@sentry/nextjs': ^10.47.0
  oxlint: ^1.58.0

catalogMode: prefer

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry/cli'
  - bufferutil
  - esbuild
  - msw
  - sharp
  - utf-8-validate

overrides:
  keyv: 'npm:@keyvhq/core@~1.6.6'
  axios: 'npm:axios@^0.32.0'
  esbuild: 'npm:esbuild@^0.25.0'
  form-data: '>=4.0.6 <5'
  glob: '>=10.5.0'
  vite: '>=7.3.5 <8'
  js-yaml: '>=4.2.0 <5'
  mdast-util-to-hast: '>=13.2.1'
  preact: '>=10.27.3'
  flatted: '>=3.4.2 <4'
  lodash: '>=4.18.0 <5'
  follow-redirects: '>=1.16.0 <2'
  fast-uri: '>=3.1.2 <4'
  postcss: '>=8.5.10 <9'
  webpack: '>=5.104.1 <6'
  turbo: '>=2.9.14 <3'
  dompurify: '3.4.10'
  shell-quote: '>=1.8.4 <2'
  '@babel/core': '>=7.29.6 <8'
  '@opentelemetry/core': '>=2.8.0 <3'
  'immutable@<3.8.3': '>=3.8.3 <4'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4 <5'
  'brace-expansion@>=5.0.0 <5.0.6': '>=5.0.6 <6'
  'ws@>=8.0.0 <8.20.1': '>=8.20.1 <9'
  'uuid@<11.1.1': '>=11.1.1 <12'
